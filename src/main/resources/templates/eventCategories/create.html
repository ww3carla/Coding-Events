<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org/">
<head th:replace="fragments :: head(${title})"></head>
<body class="container">

<h1 th:text="${title}">Create Category</h1>
<header th:replace="fragments :: header"></header>

<form method="post" th:object="${eventCategory}">
  <div class="from-group">
    <label>Name
      <input th:field="${eventCategory.name}" class="form-control">
    </label>
    <p class="error" th:errors="${eventCategory.name}"></p>
  </div>

  <div class="form-group">
    <input type="submit" value="Create Category" class="btn btn-success">
  </div>
</form>

</body>
</html>
