<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

<head th:fragment="head">
    <meta charset="UTF-8">
    <title th:text="${title}">Coding Events</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/styles.css}">

</head>
<body>

<nav th:fragment="header">
    <ul class="nav">
        <!-- public -->
        <li class="nav-item"><a href="/events" class="nav-link">All Events</a></li>
        <li class="nav-item"><a href="/categories" class="nav-link">All Categories</a></li>
        <li class="nav-item"><a href="/tags" class="nav-link">All Tags</a></li>

        <!-- developer+admin -->
        <li class="nav-item" sec:authorize="hasAnyAuthority('DEVELOPER','ADMIN')"><a href="/events/create" class="nav-link">Create Event</a></li>
        <li class="nav-item" sec:authorize="hasAnyAuthority('DEVELOPER','ADMIN')"><a href="/events/delete" class="nav-link">Delete Event</a></li>

        <!-- admin -->
        <li class="nav-item" sec:authorize="hasAuthority('ADMIN')"><a href="/categories/create" class="nav-link">Create Category</a></li>
        <li class="nav-item" sec:authorize="hasAuthority('ADMIN')"><a href="/tags/create" class="nav-link">Create Tag</a></li>

        <!-- auth -->
        <li class="nav-item" sec:authorize="!isAuthenticated()"><a href="/login" class="nav-link">Login</a></li>
        <li class="nav-item" sec:authorize="!isAuthenticated()"><a href="/register" class="nav-link">Register</a></li>
        <li class="nav-item" sec:authorize="isAuthenticated()">
            <form th:action="@{/logout}" method="post" style="display:inline; margin:0;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="nav-link" style="background:none;border:none;padding:0;cursor:pointer;">
                    Logout
                </button>
            </form>
        </li>
    </ul>
</nav>

<div th:fragment="roles_table">
    <table>
        <tr>
            <th>Authority</th>
        </tr>
        <tr th:each="role : ${roles}">
            <td th:text="${role.role}"></td>
        </tr>
    </table>
</div>

<div th:fragment="users_table">
    <table>
        <tr>
            <th>Username</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>E-mail address</th>
        </tr>
        <tr th:each="user : ${users}">
            <td th:text="${user.username}"></td>
            <td th:text="${user.firstName}"></td>
            <td th:text="${user.lastName}"></td>
            <td th:text="${user.emailAddress}"></td>
        </tr>
    </table>
</div>

</div>
<div th:fragment="footer">
    <div class="footer"><p class="footer">© Coding Events</p></div>
</div>

</body>
</html>
